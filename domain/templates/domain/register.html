{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Cithara account.">
  <title>Register — Cithara</title>
  <link rel="stylesheet" href="{% static 'domain/css/styles.css' %}">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="login-page">
    <div class="card login-card">

      <div class="login-card__logo">♪ Cithara</div>
      <p class="login-card__tagline">Create your account</p>

      <form class="login-form" id="reg-form" method="post" action="/register/">
        {% csrf_token %}

        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" name="username" id="reg-username" required
                 autocomplete="username" inputmode="text"
                 onkeydown="if(event.key==='Enter'){document.getElementById('reg-form').submit();}">
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" name="email" id="reg-email" required
                 autocomplete="email" inputmode="email"
                 onkeydown="if(event.key==='Enter'){document.getElementById('reg-form').submit();}">
        </div>

        <div class="form-group">
          <label for="reg-password1">Password</label>
          <input type="password" name="password1" id="reg-password1" required
                 autocomplete="new-password"
                 onkeydown="if(event.key==='Enter'){document.getElementById('reg-form').submit();}">
        </div>

        <div class="form-group">
          <label for="reg-password2">Confirm Password</label>
          <input type="password" name="password2" id="reg-password2" required
                 autocomplete="new-password"
                 onkeydown="if(event.key==='Enter'){document.getElementById('reg-form').submit();}">
        </div>

        {% if error %}
        <p style="color: var(--error); font-size: 0.85rem; margin-bottom: 0.75rem;">{{ error }}</p>
        {% endif %}

        <input type="submit" class="btn btn--primary btn--lg" value="Create Account"
               style="width:100%; border:none; cursor:pointer;">
      </form>

      <div class="login-card__divider">already have an account?</div>
      <a href="/login/" class="btn btn--ghost" style="width:100%; justify-content:center;">Sign In</a>

    </div>
  </div>

  <script src="{% static 'domain/js/app.js' %}"></script>
</body>
</html>
